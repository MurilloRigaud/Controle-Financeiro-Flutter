name: controle_financeiro_flutter
description: "Aplicativo de Controle Financeiro Pessoal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Gerenciamento de estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Banco local
  sqflite: ^2.4.2
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5

  # API externa
  http: ^1.4.0

  # UX
  shimmer: ^3.0.0
  intl: ^0.19.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true